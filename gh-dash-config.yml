prSections:
    - title: My Pull Requests
      filters: is:open author:@me
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
    - title: For Review by Me
      filters: is:open user-review-requested:@me
      layout:
      repo:
        width: 6
    - title: For Review by Team
      filters: is:open review-requested:@me
      layout:
        repo:
          width: 6
    - title: Participated in
      filters: commenter:@me
issuesSections:
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
notificationsSections:
    - title: All
      filters: ""
    - title: Created
      filters: reason:author
    - title: Participating
      filters: reason:participating
    - title: Mentioned
      filters: reason:mention
    - title: Review Requested
      filters: reason:review-requested
    - title: Assigned
      filters: reason:assign
    - title: Subscribed
      filters: reason:subscribed
    - title: Team Mentioned
      filters: reason:team-mention
repo:
    branchesRefetchIntervalSeconds: 120
    prsRefetchIntervalSeconds: 120
defaults:
    preview:
        open: true
        width: 0.45
    prsLimit: 20
    prApproveComment: LGTM
    issuesLimit: 20
    notificationsLimit: 20
    view: prs
    layout:
        prs:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refetchIntervalMinutes: 2
keybindings:
    prs:
        - key: T
          command: gh enhance -R {{.RepoName}} {{.PrNumber}}
        - key: C
          command: printf "https://github.com/{{.RepoName}}/pull/{{.PrNumber}}" | pbcopy
        - key: O
          command: open "https://github.com/{{.RepoName}}/pull/{{.PrNumber}}"
        - key: B
          command: printf "{{.HeadRefName}}" | pbcopy
        - key: X
          command: gh pr checkout {{.PrNumber}} -R {{.RepoName}}
        - key: R
          command: gh run rerun --failed -R {{.RepoName}} {{.PrNumber}}
repoPaths: {}
theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: false
pager:
    diff: delta --navigate --features rose-pine
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
